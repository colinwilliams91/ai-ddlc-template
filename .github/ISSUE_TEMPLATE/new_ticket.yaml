name: "\U0001F4A1 New Ticket"
description: Propose a new task — the IDO entry point for all work in this repository.

title: '[type]: short imperative description'

labels:
  - "status:triage"

body:
  - type: markdown
    attributes:
      value: |
        > **Issue-Driven Orchestration (IDO):** Every unit of work starts here.
        > Fill in all required fields so the Issue Intake agent can route this
        > immediately without back-and-forth. See
        > `.github/instructions/issue-driven-orchestration.instructions.md`
        > for the full protocol.

  - type: dropdown
    id: issue_type
    attributes:
      label: "Issue Type"
      description: Select the type that best describes this work item.
      options:
        - "feature — new capability"
        - "bug — something is broken"
        - "docs — documentation only"
        - "refactor — restructuring, no behaviour change"
        - "test — test coverage"
        - "chore — dependency, tooling, CI"
        - "research — spike / time-boxed exploration"
    validations:
      required: true

  - type: dropdown
    id: target_agent
    attributes:
      label: "Target Agent"
      description: Which agent persona should lead this work?
      options:
        - "agent:copilot — Copilot coding agent (fully AI-driven)"
        - "agent:implementer — Implementer (Claude, human-reviewed)"
        - "agent:documenter — Documenter (CONTEXT.md / docs update)"
        - "agent:ralph — RALPH (iterative improvement loop)"
        - "agent:orchestrator — Orchestrator (complex decomposition needed)"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "priority:normal"
        - "priority:high"
        - "priority:critical"
        - "priority:low"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem / Objective"
      description: >
        One-paragraph description of the problem or goal. Use a user-story format
        where applicable: _As a [role] I want [capability] so that [benefit]._
      placeholder: "As a developer I want… so that…"
    validations:
      required: true

  - type: textarea
    id: ac
    attributes:
      label: "Acceptance Criteria"
      description: >
        Checklist of observable, testable outcomes that define **done**.
        Agents will use these directly as their success criteria.
      placeholder: |
        - [ ] Feature X is accessible at route /foo
        - [ ] Unit tests pass with ≥ 90 % coverage
        - [ ] CONTEXT.md is updated to reflect the change
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "Scope Constraints"
      description: >
        List files, modules, or services that **must** or **must not** be
        touched. Leave blank if there are no constraints.
      placeholder: |
        Must touch: src/auth/
        Must NOT touch: database migrations

  - type: textarea
    id: custom_instructions
    attributes:
      label: "Custom Instructions for Copilot (optional)"
      description: >
        If routing to `agent:copilot`, add any extra guidance here. This text
        will be passed verbatim as `customInstructions` in the agent assignment.
        Leave blank to use the repository default instructions.
      placeholder: |
        Use the existing AuthProvider pattern.
        Do not change the public API surface.

  - type: textarea
    id: references
    attributes:
      label: "References"
      description: >
        Screenshots, code snippets, documentation links, or related issues that
        will help the agent implement a solution.
      placeholder: |
        Related: #123
        Docs: https://…